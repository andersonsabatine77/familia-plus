name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean --non-interactive

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Patch gradle.properties
        run: |
          sed -i 's/newArchEnabled=true/newArchEnabled=false/' android/gradle.properties
          sed -i 's/reactNativeArchitectures=.*/reactNativeArchitectures=arm64-v8a/' android/gradle.properties

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK (capture log)
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace > /tmp/gradle-log.txt 2>&1 || true
          tail -150 /tmp/gradle-log.txt
          # Fail if APK not generated
          test -f app/build/outputs/apk/debug/app-debug.apk
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      - name: Upload Gradle log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-error-log
          path: /tmp/gradle-log.txt
          retention-days: 7

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: familia-plus-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
