name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean --non-interactive

      - name: Patch kotlinVersion in build.gradle
        run: |
          sed -i 's/buildscript {/buildscript {\n  ext {\n    kotlinVersion = "2.1.20"\n    kspVersion = "2.1.20-2.0.1"\n  }/' android/build.gradle
          head -10 android/build.gradle

      - name: Create local.properties
        run: echo "sdk.dir=/usr/local/lib/android/sdk" > android/local.properties

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK (with full log)
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --info --stacktrace 2>&1 | tee /tmp/gradle-full.log || true
          echo "=== ERRORS ==="
          grep -E "^e:|error:|Compilation error|What went wrong|compileKotlin FAILED" /tmp/gradle-full.log | head -40
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

      - name: Upload build log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gradle-build-log
          path: /tmp/gradle-full.log
          retention-days: 3

      - name: Upload APK if exists
        uses: actions/upload-artifact@v4
        with:
          name: familia-plus-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: ignore
