name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean --non-interactive

      - name: Patch RN gradle plugin to skip Kotlin metadata version check
        run: |
          # Gradle 9.3.1 uses Kotlin 2.2 internally; RN gradle plugin uses Kotlin 1.9.25
          # The 1.9.25 compiler can't read 2.2 metadata → add -Xskip-metadata-version-check
          python3 - << 'PYEOF'
          import os, glob
          flag = '"-Xskip-metadata-version-check"'
          target = 'node_modules/@react-native/gradle-plugin'
          for path in glob.glob(f'{target}/**/build.gradle.kts', recursive=True):
              with open(path) as f:
                  content = f.read()
              if 'Xskip-metadata-version-check' not in content and 'kotlinOptions' in content:
                  content = content.replace(
                      'allWarningsAsErrors =',
                      f'freeCompilerArgs = listOf({flag})\n      allWarningsAsErrors ='
                  )
                  with open(path, 'w') as f:
                      f.write(content)
                  print(f'Patched: {path}')
          PYEOF

      - name: Patch android configs
        run: |
          python3 - << 'PYEOF'
          import os, re, subprocess

          # 1. Injetar kotlinVersion 2.1.20 no build.gradle
          with open("android/build.gradle") as f:
              content = f.read()
          if "kotlinVersion" not in content:
              content = content.replace("buildscript {",
                  'buildscript {\n  ext {\n    kotlinVersion = "2.1.20"\n    kspVersion = "2.1.20-2.0.1"\n  }', 1)
              with open("android/build.gradle", "w") as f:
                  f.write(content)

          # 2. Substituir react {} block em app/build.gradle com caminhos fixos
          # hermes-compiler não existe como pacote em RN 0.76 (está em sdks/hermesc)
          # O JVM subprocess não encontra node mesmo com PATH correto
          with open("android/app/build.gradle") as f:
              app = f.read()
          # Substituir todo o bloco react { ... entryFile/reactNativeDir/hermesCommand/codegenDir/cliFile
          import re
          app = re.sub(
              r'entryFile\s*=\s*file\([^\n]+\)',
              'entryFile = file("$projectRoot/node_modules/expo/AppEntry.js")',
              app
          )
          app = re.sub(
              r'reactNativeDir\s*=\s*new File\([^\n]+\)',
              'reactNativeDir = new File("$projectRoot/node_modules/react-native")',
              app
          )
          app = re.sub(
              r'hermesCommand\s*=\s*new File\([^\n]+\)',
              'hermesCommand = "$projectRoot/node_modules/react-native/sdks/hermesc/%OS-BIN%/hermesc"',
              app
          )
          app = re.sub(
              r'codegenDir\s*=\s*new File\([^\n]+\)',
              'codegenDir = new File("$projectRoot/node_modules/@react-native/codegen")',
              app
          )
          app = re.sub(
              r'cliFile\s*=\s*new File\([^\n]+\)',
              'cliFile = new File("$projectRoot/node_modules/@expo/cli/build/src/bin/cli.js")',
              app
          )
          # Remover propriedade desconhecida enableBundleCompression
          app = re.sub(r'\s*enableBundleCompression\s*=\s*[^\n]+\n', '\n', app)
          with open("android/app/build.gradle", "w") as f:
              f.write(app)
          print("app/build.gradle patched OK")

          # 3. local.properties
          sdk = os.environ.get("ANDROID_SDK_ROOT", "/usr/local/lib/android/sdk")
          with open("android/local.properties", "w") as f:
              f.write(f"sdk.dir={sdk}\n")

          print("Done patching android configs")
          PYEOF

      - name: Create local.properties
        run: echo "sdk.dir=/usr/local/lib/android/sdk" > android/local.properties

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK
        run: cd android && ./gradlew assembleDebug --no-daemon
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: familia-plus-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
