name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean --non-interactive

      - name: Patch android configs
        run: |
          # Usar Gradle 8.13 (compatível com Expo SDK 56 + Kotlin 1.9)
          sed -i 's|gradle-9.3.1-bin.zip|gradle-8.13-bin.zip|' android/gradle/wrapper/gradle-wrapper.properties
          # Desabilitar new arch e limitar arquitetura
          sed -i 's/newArchEnabled=true/newArchEnabled=false/' android/gradle.properties
          sed -i 's/reactNativeArchitectures=.*/reactNativeArchitectures=arm64-v8a/' android/gradle.properties
          # Confirmar mudanças
          grep "distributionUrl" android/gradle/wrapper/gradle-wrapper.properties
          grep -E "newArch|Architecture" android/gradle.properties

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK
        run: cd android && ./gradlew assembleDebug --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: familia-plus-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
