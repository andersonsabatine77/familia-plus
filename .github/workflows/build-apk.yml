name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Patch RN gradle plugin (skip Kotlin metadata version check)
        run: |
          python3 - << 'PYEOF'
          import glob
          flag = '"-Xskip-metadata-version-check"'
          target = 'node_modules/@react-native/gradle-plugin'
          for path in glob.glob(f'{target}/**/build.gradle.kts', recursive=True):
              with open(path) as f:
                  content = f.read()
              if 'Xskip-metadata-version-check' not in content and 'kotlinOptions' in content:
                  content = content.replace(
                      'allWarningsAsErrors =',
                      f'freeCompilerArgs = listOf({flag})\n      allWarningsAsErrors ='
                  )
                  with open(path, 'w') as f:
                      f.write(content)
                  print(f'Patched: {path}')
          PYEOF

      - name: Create local.properties
        run: echo "sdk.dir=/usr/local/lib/android/sdk" > android/local.properties

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK
        run: cd android && ./gradlew assembleDebug --no-daemon
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: familia-plus-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
