// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  ext {
    kotlinVersion = "2.1.20"
    kspVersion = "2.1.20-2.0.1"
  }
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin:2.1.20')
  }
}

allprojects {
  repositories {
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }
  // Force Kotlin 2.1.20 everywhere so pika-compiler version matches
  configurations.all {
    resolutionStrategy {
      force 'org.jetbrains.kotlin:kotlin-gradle-plugin:2.1.20'
      force 'org.jetbrains.kotlin:kotlin-stdlib:2.1.20'
      force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:2.1.20'
      force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:2.1.20'
      force 'org.jetbrains.kotlin:kotlin-reflect:2.1.20'
    }
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"
