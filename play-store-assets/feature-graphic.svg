<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#7B6CFF"/>
      <stop offset="55%"  stop-color="#6C63FF"/>
      <stop offset="100%" stop-color="#43C6AC"/>
    </linearGradient>
    <linearGradient id="heart" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FF7B9C"/>
      <stop offset="100%" stop-color="#FF5C7C"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1024" height="500" fill="url(#bg)"/>

  <!-- circulos decorativos -->
  <circle cx="930" cy="60" r="120" fill="#FFFFFF" opacity="0.06"/>
  <circle cx="120" cy="460" r="160" fill="#FFFFFF" opacity="0.05"/>

  <!-- Logo: casa + coracao -->
  <g transform="translate(150,250) scale(0.30) translate(-512,-512)" filter="url(#soft)">
    <path d="M512 250 L792 470 L232 470 Z" fill="#FFFFFF"/>
    <rect x="300" y="455" width="424" height="320" rx="34" fill="#FFFFFF"/>
    <path d="M512 715 C512 715 410 648 410 565 C410 520 446 488 492 488 C512 488 512 488 512 510 C512 488 512 488 532 488 C578 488 614 520 614 565 C614 648 512 715 512 715 Z" fill="url(#heart)"/>
  </g>

  <!-- Texto -->
  <text x="340" y="235" font-family="Arial, sans-serif" font-size="92" font-weight="800" fill="#FFFFFF">Família+</text>
  <text x="344" y="300" font-family="Arial, sans-serif" font-size="34" font-weight="500" fill="#FFFFFF" opacity="0.92">Finanças, filhos, compras e agenda</text>
  <text x="344" y="345" font-family="Arial, sans-serif" font-size="34" font-weight="500" fill="#FFFFFF" opacity="0.92">da sua família — 100% offline</text>
</svg>
